server:
  port: 8080
  servlet:
    context-path:

spring:
  application:
    name: soccerhub-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@localhost:1521/XEPDB1?useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8
    username: soccerhub
    password: soccerhub2026
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SoccerHub-HikariPool
  redis:
    host: localhost
    port: 6379
    database: 0
    lettuce:
      pool:
        max-active: 10
        max-idle: 8
        min-idle: 2
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.soccerhub.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: SoccerHub2026SecretKeyForJWTTokenGenerationMustBe256Bits!
  expiration: 86400000
  refresh-expiration: 604800000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    operations-sorter: method

upload:
  path: uploads

ai:
  qwen:
    api-key: sk-cd16bec8c3614d699f3b7a6d88429c0a
    model: qwen-plus-2025-07-28
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1

logging:
  level:
    root: INFO
    com.soccerhub: DEBUG
    org.springframework.security: DEBUG
